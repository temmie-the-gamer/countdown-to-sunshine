<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to 12:00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .countdown-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .time-unit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
        }

        .time-unit-value {
            font-size: 3em;
            font-weight: bold;
            display: block;
        }

        .time-unit-label {
            font-size: 0.9em;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .message {
            margin-top: 30px;
            font-size: 1.2em;
            color: #666;
        }

        .finished {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <h1>Countdown to Sunshine ☀️</h1>
        <p class="message">Time remaining until 12:00 PM</p>
        
        <div class="countdown" id="countdown">
            <div class="time-unit">
                <span class="time-unit-value" id="hours">00</span>
                <div class="time-unit-label">Hours</div>
            </div>
            <div class="time-unit">
                <span class="time-unit-value" id="minutes">00</span>
                <div class="time-unit-label">Minutes</div>
            </div>
            <div class="time-unit">
                <span class="time-unit-value" id="seconds">00</span>
                <div class="time-unit-label">Seconds</div>
            </div>
        </div>

        <div id="finished-message" style="display: none; font-size: 2em; color: #667eea; font-weight: bold; margin-top: 20px;">
            🎉 It's 12:00! Time for Sunshine! 🎉
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            const target = new Date();
            target.setHours(12, 0, 0, 0);

            // If 12:00 has already passed, set target for tomorrow
            if (now >= target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('finished-message').style.display = 'block';
                document.getElementById('finished-message').classList.add('finished');
                return;
            }

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // Update immediately on load
        updateCountdown();

        // Update every second
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
